# change bingding
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# start panes from 1
set -g base-index 1
setw -g pane-base-index 1
#config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config Reload"
# remove closing warning
bind x kill-pane
unbind t
bind t resize-pane -Z
bind \` if-shell -F '#{window_zoomed_flag}' {
  resize-pane -Z
  if-shell -F '#{pane_at_left}' {
    select-pane -R
  } {
    select-pane -L
  }
} {
  if-shell -F '#{pane_at_left}' {
    resize-pane -Z
  } {
    select-pane -L
    resize-pane -Z
  }
}
#set C-a to last-window
bind-key C-a last-window
set -g @tmux_window_name_use_tilde "False"
#set mouse on
set -g mouse on
set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""
set -g @minimal-tmux-justify "absolute-centre"
set -g @minimal-tmux-status-right "#{pomodoro_status} #S"
set -g @pomodoro_granularity 'on'
set -g @pomodoro_interval_display ' [%s/%s]'
set -g status-interval 1
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'olimorris/tmux-pomodoro-plus'
run '~/.config/tmux/plugins/tpm/tpm'
